services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: devpulse-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    container_name: devpulse-api
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: devpulse
      SEED_ON_START: "true"
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy

  web:
    build: ./web
    container_name: devpulse-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  clickhouse-data:
